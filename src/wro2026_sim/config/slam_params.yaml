slam_toolbox:
  ros__parameters:

    # ── Plugin / mode ──────────────────────────────────────────────────────
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ── Topics / frames ────────────────────────────────────────────────────
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_map_saver: true
    mode: mapping

    # ── Loop closure ───────────────────────────────────────────────────────
    # 小場地要關掉 loop closure 的距離門檻，不然容易誤觸
    do_loop_closing: true
    loop_search_maximum_distance: 3.0      # WRO 場地對角線約 3m，設 3 剛好
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45
    loop_closing_minimum_response_fine: 0.45
    loop_closing_score_minimum_response_fine: 0.45

    # ── 掃描匹配 ────────────────────────────────────────────────────────────
    distance_decompose_angle: 0.523        # 30 度
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 2.0        # 小場地不需要遠距連結

    # ── 更新觸發（關鍵：防止無限擴大）──────────────────────────────────────
    # 原本設 0.01/0.1 太激進，每動一下就更新，造成地圖噪點累積
    minimum_travel_distance: 0.3           # 移動 30cm 才更新一次
    minimum_travel_heading: 0.3            # 轉 17° 才更新一次
    map_update_interval: 3.0              # 最快 3 秒更新一次地圖 topic

    # ── 地圖大小上限（核心修正：防止 100×200 無限擴張）──────────────────────
    # WRO 2026 場地實際大小約 3m × 3m，留 50% 餘量
    # Gazebo 座標系：車子從 (0, 0.9) 出發，場地大概 -2~2 / -2~2
    map_start_at_dock: false
    map_start_pose: [0.0, 0.0, 0.0]

    # ── 解析度 ──────────────────────────────────────────────────────────────
    resolution: 0.05                       # 5cm/pixel，WRO 場地夠用
    max_laser_range: 3.5                   # TurtleBot3 LiDAR 最遠 3.5m
    minimum_time_interval: 0.3            # 最快 0.3s 處理一幀 scan

    # ── 姿態共變異數 ────────────────────────────────────────────────────────
    covariance_sigmas:
      - 0.1
      - 0.1
      - 0.1

    # ── 序列化（存 slam session 用）────────────────────────────────────────
    use_scan_matching: true
    use_scan_barycenter: true
    stack_size_to_use: 40000000           # 40MB
    tf_buffer_duration: 30.0

    # ── 補償 TF 延遲 ────────────────────────────────────────────────────────
    transform_publish_period: 0.02        # 50Hz TF 輸出
    transform_timeout: 0.2
    throttle_scans: 1                     # 每幀都處理（scan 只有 4.7Hz，不需要 skip）

    # ── 儲存設定 ────────────────────────────────────────────────────────────
    # 建完後手動存：
    # ros2 run nav2_map_server map_saver_cli -f ~/ros2_ws/src/wro2026_sim/maps/wro2026_map